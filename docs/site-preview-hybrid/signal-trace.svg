<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="title desc">
  <title id="title">Signal trace graph</title>
  <desc id="desc">A stylized risk trace with a sharp spike passing a warning threshold.</desc>
  <rect width="760" height="460" fill="#0b120f"/>
  <text x="28" y="36" fill="#4af626" font-family="Consolas, monospace" font-size="18">[SIGNAL_TRACE]</text>
  <text x="542" y="36" fill="#8b9794" font-family="Consolas, monospace" font-size="16">RISK OVER ACTION PATH</text>

  <g transform="translate(54 72)">
    <rect width="644" height="320" fill="#0f1714" stroke="#1f3527"/>
    <g stroke="#1f3527" stroke-width="1">
      <path d="M0 53H644M0 106H644M0 159H644M0 212H644M0 265H644"/>
      <path d="M92 0V320M184 0V320M276 0V320M368 0V320M460 0V320M552 0V320"/>
    </g>

    <path d="M0 270 L92 248 L184 242 L276 212 L368 196 L460 138 L552 82 L644 108 L644 320 L0 320 Z" fill="#4af626" fill-opacity="0.08"/>
    <path d="M0 270 L92 248 L184 242 L276 212 L368 196 L460 138 L552 82 L644 108" fill="none" stroke="#4af626" stroke-width="4"/>
    <path d="M0 222 L92 216 L184 204 L276 190 L368 170 L460 154 L552 150 L644 148" fill="none" stroke="#ff4d00" stroke-dasharray="8 8" stroke-width="3"/>

    <circle cx="552" cy="82" r="7" fill="#ff4d00"/>
    <rect x="428" y="28" width="182" height="40" fill="#1a110d" stroke="#ff4d00" stroke-width="2"/>
    <text x="442" y="54" fill="#ff4d00" font-family="Consolas, monospace" font-size="18">WARNING THRESHOLD BREACHED</text>
  </g>

  <g font-family="Consolas, monospace" font-size="16" fill="#8b9794">
    <text x="54" y="420">PREFLOP</text>
    <text x="202" y="420">FLOP</text>
    <text x="352" y="420">TURN</text>
    <text x="502" y="420">RIVER</text>
    <text x="620" y="420">DECISION</text>
  </g>
</svg>
